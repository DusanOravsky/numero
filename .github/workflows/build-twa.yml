name: Build TWA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install build tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Decode keystore
        run: echo "${{ secrets.TWA_KEYSTORE_BASE64 }}" | base64 -d > twa/android.keystore

      - name: Build AAB
        working-directory: twa
        run: |
          npm install @nicolo-ribaudo/nicolo-ribaudo 2>/dev/null || true
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/twa/android.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.TWA_KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=android \
            -Pandroid.injected.signing.key.password=${{ secrets.TWA_KEY_PASSWORD }}

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: integral-map-release
          path: twa/app/build/outputs/bundle/release/*.aab
